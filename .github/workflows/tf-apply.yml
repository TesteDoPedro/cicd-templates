name: Reusable - Terraform Apply

on:
  workflow_call:
    inputs:
      aws_region:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true
      TF_STATE_BUCKET:
        required: true
      TF_LOCK_TABLE:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: "Terraform Apply (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform -chdir=infra init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ github.repository }}/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true"

      - name: Terraform Plan
        run: |
          VAR_FILE=""
          if [ -f "infra/inventories/${{ inputs.environment }}.tfvars" ]; then
            VAR_FILE="-var-file=inventories/${{ inputs.environment }}.tfvars"
            echo "📦 Variable definitions file found! Injetando: $VAR_FILE"
          fi
          terraform -chdir=infra plan -out=tfplan $VAR_FILE -var="environment=${{ inputs.environment }}" -var="aws_region=${{ inputs.aws_region }}"

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve tfplan
